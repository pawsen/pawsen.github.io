baseurl = "pawsen.github.io"
languageCode = "en-us"
title = "Whoa"
# aka, "hugo-theme-terminal"
# theme = "terminal"
theme = "hugo-coder"
enableEmoji = "true"
paginate = 5

[params]
  contentTypeName = "posts"
  themeColor = "pink"
  showMenuItems = 2
  fullWidthTheme = false
  centerTheme = true
  info = ["Full Stack DevOps", "Avid reader", "Climbing"]
  avatarURL = "images/avatar.jpg"
  colorScheme = "auto"  # or dark

# Social links
[[params.social]]
  name = "Github"
  icon = "fa fa-github fa-2x"
  weight = 1
  url = "https://github.com/pawsen/"

[languages.en.params]
  keywords = ""
  copyright = ""
  menuMore = "Show more"
  readMore = "Read more"
  readOtherPosts = "Read other posts"

[languages.en.params.logo]
  logoText = "GO HoMe"
  logoHomeLink = "/"

  [[languages.en.menu.main]]
    identifier = "about"
    name = "About"
    url = "/about"
    weight = "1"

  [[languages.en.menu.main]]
    name = "Posts"
    weight = "2"
    url = "posts/"
